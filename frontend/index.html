<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StudyHub — Group Study Management</title>
    <link
      rel="stylesheet"
      href="https://fonts.bunny.net/css?family=plus-jakarta-sans:400,500,600,700&display=swap"
    />
    <script>
      (function () {
        try {
          var raw = localStorage.getItem('studyhub-theme');
          var t = raw ? JSON.parse(raw).state?.theme : null;
          if (t === 'dark') document.documentElement.classList.add('dark');
          else if (t === 'light') document.documentElement.classList.remove('dark');
          else if (window.matchMedia('(prefers-color-scheme: dark)').matches)
            document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
